liip_imagine:
    driver: gd

    filter_sets:
        mini:
            quality: 80
            filters:
                thumbnail:
                    size: [150, 150]
                    mode: outbound
                    allow_upscale: false

        thumb:
            quality: 82
            filters:
                thumbnail:
                    size: [400, 534]
                    mode: outbound
                    allow_upscale: false

        detail:
            quality: 85
            filters:
                thumbnail:
                    size: [800, 1067]
                    mode: outbound
                    allow_upscale: false

        case_card:
            quality: 85
            filters:
                thumbnail:
                    size: [800, 600]
                    mode: outbound
                    allow_upscale: false

        case_detail:
            quality: 88
            filters:
                thumbnail:
                    size: [1400, 1050]
                    mode: inset
                    allow_upscale: false

        case_gallery_thumb:
            quality: 84
            filters:
                thumbnail:
                    size: [900, 675]
                    mode: outbound
                    allow_upscale: false

        package_card:
            quality: 85
            filters:
                thumbnail:
                    size: [900, 506]
                    mode: outbound
                    allow_upscale: false
