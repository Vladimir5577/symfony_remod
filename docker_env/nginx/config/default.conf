# ==========================================================
#  PROD — localhost:80
# ==========================================================
server {
	listen 80;
	server_name localhost;
	root /var/www/html/public;
	client_max_body_size 20M;

	error_log  /var/log/nginx/error.log;
	access_log /var/log/nginx/access.log;

	# --------------------------------------------------
	#  1. Symfony  (API, админка, авторизация)
	# --------------------------------------------------
	location ~ ^/api(/|$) {
		try_files $uri /index.php?$query_string;
	}

	# --------------------------------------------------
	#  2. Статика  (загрузки, картинки, кэш ресайзов)
	# --------------------------------------------------
	location /uploads/ {
		try_files $uri =404;
	}

	location ~* ^/media/cache/resolve/ {
		fastcgi_pass php:9000;
		include fastcgi_params;
		fastcgi_param SCRIPT_FILENAME $document_root/index.php;
		fastcgi_param SCRIPT_NAME /index.php;
		fastcgi_param REQUEST_URI $uri;
	}

	location ~* ^/media/cache/ {
		try_files $uri @imagine_resolve;
	}

	location @imagine_resolve {
		rewrite ^/media/cache/(.*)$ /media/cache/resolve/$1 last;
	}

	# --------------------------------------------------
	#  3. PHP-FPM
	# --------------------------------------------------
	location ~ \.php$ {
		try_files $uri =404;
		fastcgi_split_path_info ^(.+\.php)(/.+)$;
		fastcgi_pass php:9000;
		fastcgi_index index.php;
		include fastcgi_params;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		fastcgi_param PATH_INFO $fastcgi_path_info;
	}

	# --------------------------------------------------
	#  4. Фронтенд  (React SPA из dist/)
	# --------------------------------------------------
	location / {
		root /var/www/frontend;
		try_files $uri /index.html;
	}
}


# ==========================================================
#  DEV — localhost:3000
# ==========================================================
server {
	listen 3000;
	server_name localhost;
	root /var/www/html/public;
	client_max_body_size 20M;

	error_log  /var/log/nginx/error.log;
	access_log /var/log/nginx/access.log;

	# Docker DNS — резолв react_app при запросе, не при старте
	resolver 127.0.0.11 valid=30s;
	set $vite http://react_app:5173;

	# --------------------------------------------------
	#  1. Symfony  (API, админка, авторизация)
	# --------------------------------------------------
	location ~ ^/api(/|$) {
		try_files $uri /index.php?$query_string;
	}

	# --------------------------------------------------
	#  2. Статика  (загрузки, картинки, кэш ресайзов)
	# --------------------------------------------------
	location /uploads/ {
		try_files $uri =404;
	}

	location ~* ^/media/cache/resolve/ {
		fastcgi_pass php:9000;
		include fastcgi_params;
		fastcgi_param SCRIPT_FILENAME $document_root/index.php;
		fastcgi_param SCRIPT_NAME /index.php;
		fastcgi_param REQUEST_URI $uri;
	}

	location ~* ^/media/cache/ {
		try_files $uri @imagine_resolve_dev;
	}

	location @imagine_resolve_dev {
		rewrite ^/media/cache/(.*)$ /media/cache/resolve/$1 last;
	}

	# --------------------------------------------------
	#  3. PHP-FPM
	# --------------------------------------------------
	location ~ \.php$ {
		try_files $uri =404;
		fastcgi_split_path_info ^(.+\.php)(/.+)$;
		fastcgi_pass php:9000;
		fastcgi_index index.php;
		include fastcgi_params;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		fastcgi_param PATH_INFO $fastcgi_path_info;
	}

	# --------------------------------------------------
	#  4. Vite  (dev server + HMR)
	# --------------------------------------------------
	location /@vite/ {
		proxy_pass $vite;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
	}

	location /@react-refresh {
		proxy_pass $vite;
	}

	location /src/ {
		proxy_pass $vite;
	}

	location /node_modules/ {
		proxy_pass $vite;
	}

	# --------------------------------------------------
	#  5. Фронтенд  (Vite dev server)
	# --------------------------------------------------
	location / {
		proxy_pass $vite;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
	}
}

server {
	listen 8080;
	index index.php index.html;
	server_name localhost;
	error_log /var/log/nginx/error.log;
	access_log /var/log/nginx/access.log;
	root /var/www/html/public;

	# Max body size file upload
	client_max_body_size 20M;


	location / {
		try_files $uri $uri/ /index.php?$query_string;
	}

	location ~ \.php$ {
		try_files $uri =404;
		fastcgi_split_path_info ^(.+\.php)(/.+)$;
		fastcgi_pass php:9000;
		fastcgi_index index.php;
		include fastcgi_params;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		fastcgi_param PATH_INFO $fastcgi_path_info;
	}
}
